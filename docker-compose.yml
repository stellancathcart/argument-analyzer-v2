services:
  db:
    image: postgres:16
    container_name: argument-analyzer-db
    environment:
      POSTGRES_DB: argument_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: argument-analyzer-app
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/argument_db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data: